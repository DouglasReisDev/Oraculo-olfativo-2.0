<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oráculo olfativo2.0 — Perfumes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <h1>Oráculo olfativo <em>2.0</em></h1>
  <p class="header-eyebrow">..... </p>
  <p class="">Coleção pessoal</p>
</header>
<div class="nav-wrapper">
  <p class="filters-label">Filtrar por ocasião</p>
  <div class="filters">
    <button class="filter-btn" data-cat="primavera">🌸 Primavera</button>
    <button class="filter-btn" data-cat="verao">☀️ Verão</button>
    <button class="filter-btn" data-cat="outono">🍂 Outono</button>
    <button class="filter-btn" data-cat="inverno">❄️ Inverno</button>
    <button class="filter-btn" data-cat="dia">🌤 Dia</button>
    <button class="filter-btn" data-cat="noite">🌙 Noite</button>
  </div>
</div>

<div class="count-bar">
  <span id="visibleCount">0</span> perfume(s) visíveis
</div>

<main class="grid" id="grid">
  <div class="empty-state" id="emptyState">
    <p>Nenhum perfume encontrado para essa combinação.</p>
  </div>
</main>

<div class="footer-area">
  <button class="btn-sortear" id="btnSortear">
    <span>✦ Sortear</span>
  </button>
  <p class="sortear-hint" id="sortearHint">Sorteie entre os perfumes visíveis</p>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <p class="modal-eyebrow">✦ Perfume Sorteado</p>
    <span class="modal-icon" id="modalIcon"></span>
    <h2 class="modal-name" id="modalName"></h2>
    <p class="modal-brand" id="modalBrand"></p>
    <p class="modal-notes" id="modalNotes"></p>
    <div class="modal-tags" id="modalTags"></div>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-outline" id="btnSortearNovamente">Sortear novamente</button>
      <button class="btn-modal btn-modal-gold" id="btnFechar">Usar este</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
